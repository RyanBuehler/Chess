# arch-10x128: isolates the architecture axis vs baseline (6x64).
# Identical to baseline except run_name, network, and eval.games_per_rung.
# Sims stay at 200 so the only variable is network depth/width.
run_name: arch-10x128
network: {blocks: 10, filters: 128}
mcts: {simulations: 200, temperature_moves: 30, leaves_per_tree: 1}
selfplay:
  workers: 4
  concurrent_games: 32
  ply_cap: 512
  feed_port: 5555            # workers publish on 5555..5558
training:
  batch_size: 256
  learning_rate: 0.001
  buffer_size: 500000
  samples_per_position: 2.0
  checkpoint_every_steps: 500
  device: cuda
  selfplay_device: cuda
eval:
  every_n_checkpoints: 1
  games_per_rung: 4
  agent_simulations: 50
  max_plies: 160
  stockfish_path: tools/stockfish/stockfish.exe
  stockfish_movetime_ms: 50
