<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>chessrl — play</title>
<link rel="stylesheet" href="/vendor/chessground.base.css"/>
<link rel="stylesheet" href="/vendor/chessground.brown.css"/>
<link rel="stylesheet" href="/vendor/chessground.cburnett.css"/>
<link rel="stylesheet" href="/style.css"/>
</head><body>
<nav class="topnav">
  <span class="brand">♞ chessrl</span>
  <a href="/index.html">Dashboard</a><a href="/live.html">Live</a><a href="/play.html" class="active">Play</a><a href="/arena.html">Arena</a><a href="/compare.html">Compare</a>
</nav>
<main style="grid-template-columns:auto auto 1fr;">
  <section>
    <div class="controls">
      <label>run <select id="run"></select></label>
      <label>ckpt <select id="ckpt"></select></label>
      <label>sims <input id="sims" type="number" value="100" min="1" style="width:5rem"/></label>
      <label>play <select id="color"><option value="white">White</option><option value="black">Black</option></select></label>
      <button id="newgame">New game</button>
    </div>
    <div id="play-board" class="board-lg"></div>
    <div id="status" class="hint"></div>
    <div class="controls uci-row">
      <label>UCI <input id="uci-input" type="text" placeholder="e2e4" autocomplete="off"/></label>
      <button id="uci-send">Send move</button>
      <small class="hint">promotions auto-queen (append q, e.g. e7e8q)</small>
    </div>
  </section>
  <div class="eval-bar"><div id="eval-fill" class="eval-fill"></div></div>
  <section><h3>Agent thoughts</h3><ul id="thoughts" class="thoughts"></ul></section>
</main>
<script type="module" src="/play.js"></script>
</body></html>
